services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-s3r_store}
      MYSQL_USER: ${MYSQL_USER:-django}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-django}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data_seeding.sql:/docker-entrypoint-initdb.d/data_seeding.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["gunicorn", "--bind", "0.0.0.0:8000", "--workers", "4", "--access-logfile", "-", "shop.wsgi:application"]
    environment:
      - DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-s3r_store}
      - MYSQL_USER=${MYSQL_USER:-django}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-django}
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - REDIS_URL=redis://redis:6379/0
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/www/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/www/media:ro
    depends_on:
      - web

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["celery", "-A", "shop", "worker", "-l", "INFO"]
    environment:
      - DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-s3r_store}
      - MYSQL_USER=${MYSQL_USER:-django}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-django}
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/www/media
    depends_on:
      - db
      - redis

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:
