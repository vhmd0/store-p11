{% load i18n %}
{% load bootstrap_icons %}

{% if not user.is_authenticated %}
<div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
    <div class="modal-content border-0 shadow-2xl rounded-5 overflow-hidden">
      
      <div style="height: 5px; background: linear-gradient(90deg, #212529 0%, #495057 100%);"></div>

      <div class="modal-header border-0 pt-4 px-4 pb-2">
        <div class="text-center w-100">
          <h4 class="fw-black mb-1" id="authModalLabel" style="letter-spacing: -0.02em;">{% trans "Join Us" %}</h4>
          <p class="text-muted small">{% trans "Experience the best of Smart S3R." %}</p>
        </div>
        <button type="button" class="btn-close position-absolute end-0 top-0 m-3 shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body px-4 pt-0">
        <form action="{% url 'register' %}" method="post" class="needs-validation">
          {% csrf_token %}

          <div class="form-floating mb-3">
            <input type="text" name="username" id="modal_username" 
                   class="form-control border-0 bg-light rounded-3 shadow-none" 
                   placeholder="Username" required>
            <label class="text-muted small px-3">{% bs_icon 'person' %} {% trans "Username" %}</label>
          </div>

          <div class="form-floating mb-3">
            <input type="email" name="email" id="modal_email" 
                   class="form-control border-0 bg-light rounded-3 shadow-none" 
                   placeholder="Email" required>
            <label class="text-muted small px-3">{% bs_icon 'envelope' %} {% trans "Email" %}</label>
          </div>

          <div class="row g-2 mb-4">
            <div class="col-6">
              <div class="form-floating">
                <input type="password" name="password1" id="modal_password1" 
                       class="form-control border-0 bg-light rounded-3 shadow-none" 
                       placeholder="Password" required>
                <label class="text-muted small">{% bs_icon 'lock' %} {% trans "Pass" %}</label>
              </div>
            </div>
            <div class="col-6">
              <div class="form-floating">
                <input type="password" name="password2" id="modal_password2" 
                       class="form-control border-0 bg-light rounded-3 shadow-none" 
                       placeholder="Confirm" required>
                <label class="text-muted small">{% bs_icon 'check-circle' %} {% trans "Confirm" %}</label>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-dark w-100 py-3 rounded-pill fw-bold shadow-sm mb-3 transition-transform">
            {% trans "Create Account" %}
          </button>
        </form>

        <div class="d-flex align-items-center my-3 opacity-25">
            <hr class="flex-grow-1 m-0">
            <span class="px-2 small text-uppercase fw-bold">{% trans "or" %}</span>
            <hr class="flex-grow-1 m-0">
        </div>
      </div>

      <div class="modal-footer border-0 pb-4 pt-0 d-flex justify-content-center bg-light bg-opacity-50">
        <p class="text-muted small mb-0">
          {% trans "Already a member?" %}
          <a href="{% url 'login' %}" class="fw-bold text-dark text-decoration-underline-hover">{% trans "Log in here" %}</a>
        </p>
      </div>

    </div>
  </div>
</div>

<style>
    .fw-black { font-weight: 900; }
    .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    
    .form-floating > .form-control:focus {
        background-color: #f8f9fa !important;
        box-shadow: inset 0 0 0 2px #212529 !important;
    }

    .form-floating > label {
        display: flex;
        align-items: center;
        gap: 8px;
        opacity: 0.7;
    }

    .transition-transform:active {
        transform: scale(0.98);
    }

    .text-decoration-underline-hover:hover {
        text-decoration: underline !important;
    }

    /* Fix for Floating Labels icons */
    .form-floating > .form-control:focus ~ label,
    .form-floating > .form-control:not(:placeholder-shown) ~ label {
        transform: scale(.85) translateY(-0.7rem) translateX(0.15rem);
        color: #212529;
        opacity: 1;
    }
</style>
{% endif %}
