{% load i18n %}

<div class="cart-summary-wrapper p-3 bg-secondary bg-opacity-10 rounded-4 border border-secondary border-opacity-25">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <span class="text-white-50 fw-semibold small text-uppercase tracking-wider">{% trans "Subtotal" %}</span>
        <span class="h5 fw-black mb-0 text-accent">
            {{ cart_total }} <small class="text-white-50 fw-bold" style="font-size: 0.75rem;">{% if request.LANGUAGE_CODE == 'ar' %}ج.م{% else %}EGP{% endif %}</small>
        </span>
    </div>

    <div class="d-grid gap-2">
        <a href="{% url 'cart:detail' %}"
           class="btn btn-outline-light border-secondary rounded-pill fw-bold py-2 shadow-none transition-all hover-accent"
           style="font-size: 0.85rem;">
           <i class="bi bi-bag-check me-1"></i> {% trans "View Cart" %}
        </a>

        {% if user.is_authenticated %}
            <a href="{% url 'orders:checkout' %}"
               class="btn btn-accent rounded-pill fw-bold py-3 shadow-sm d-flex align-items-center justify-content-center gap-2">
               <i class="bi bi-shield-lock-fill"></i>
               <span>{% trans "Secure Checkout" %}</span>
            </a>
        {% else %}
            <button type="button" 
                    class="btn btn-accent rounded-pill fw-bold py-3 shadow-sm d-flex align-items-center justify-content-center gap-2"
                    data-bs-toggle="modal" data-bs-target="#authModal">
                <i class="bi bi-shield-lock-fill"></i>
                <span>{% trans "Secure Checkout" %}</span>
            </button>
        {% endif %}
    </div>

    <p class="text-center text-white-50 mt-3 mb-0" style="font-size: 0.65rem;">
        <i class="bi bi-patch-check-fill text-accent"></i> {% trans "Taxes and shipping calculated at checkout" %}
    </p>
</div>

<style>
    .fw-black { font-weight: 900; }
    .tracking-wider { letter-spacing: 0.05em; }
    .text-accent { color: #10b981 !important; }
    .btn-accent { background: #10b981; color: #0f172a; border: none; font-size: 0.9rem; transition: 0.3s; }
    .btn-accent:hover { background: #059669; color: #fff; transform: translateY(-2px); box-shadow: 0 10px 15px rgba(16, 185, 129, 0.4); }
    .hover-accent:hover { border-color: var(--accent) !important; color: var(--accent) !important; background: rgba(16, 185, 129, 0.1); }
</style>
