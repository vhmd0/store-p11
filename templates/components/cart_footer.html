{% load i18n %}

<div class="cart-summary-wrapper p-3 bg-light rounded-4 border border-opacity-10">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <span class="text-muted fw-semibold small text-uppercase tracking-wider">{% trans "Subtotal" %}</span>
        <span class="h5 fw-black mb-0 text-dark">
            {{ cart_total }} <small class="fw-bold" style="font-size: 0.75rem;">{% if request.LANGUAGE_CODE == 'ar' %}ج.م{% else %}EGP{% endif %}</small>
        </span>
    </div>

    <div class="d-grid gap-2">
        <a href="{% url 'cart:detail' %}"
           class="btn btn-outline-dark border-2 rounded-pill fw-bold py-2 shadow-none transition-all hover-bg-dark"
           style="font-size: 0.85rem;">
           <i class="bi bi-bag-check me-1"></i> {% trans "View Cart" %}
        </a>

        {% if user.is_authenticated %}
            <a href="{% url 'orders:checkout' %}"
               class="btn btn-checkout rounded-pill fw-bold py-3 shadow-sm d-flex align-items-center justify-content-center gap-2">
               <i class="bi bi-shield-lock-fill"></i>
               <span>{% trans "Secure Checkout" %}</span>
            </a>
        {% else %}
            <button type="button" 
                    class="btn btn-checkout rounded-pill fw-bold py-3 shadow-sm d-flex align-items-center justify-content-center gap-2"
                    data-bs-toggle="modal" data-bs-target="#authModal">
                <i class="bi bi-shield-lock-fill"></i>
                <span>{% trans "Secure Checkout" %}</span>
            </button>
        {% endif %}
    </div>

    <p class="text-center text-muted mt-3 mb-0" style="font-size: 0.65rem;">
        <i class="bi bi-patch-check-fill text-success"></i> {% trans "Taxes and shipping calculated at checkout" %}
    </p>
</div>

<style>
    .fw-black { font-weight: 900; }
    .tracking-wider { letter-spacing: 0.05em; }
    
    /* Modern Green for Checkout */
    .btn-checkout {
        background: #10b981; /* Emerald 500 - لون أخضر مودرن ومريح */
        color: white;
        border: none;
        font-size: 0.9rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-checkout:hover {
        background: #059669; /* Emerald 600 */
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
    }

    .hover-bg-dark:hover {
        background-color: #212529;
        color: white !important;
    }

    .transition-all { transition: all 0.3s ease; }
</style>
